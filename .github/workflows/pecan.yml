name: pecan
on:
  push:
    branches: [ "main" ]

jobs:
    truthfully_sniff:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: truthfully_sniff
          run: |
            npm install
            timeout 328m node pecan.js
  
