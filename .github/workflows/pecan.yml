name: pecan
on:
  push:
    branches: [ "main" ]

jobs:
    orange:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: orange
          run: |
            npm install
            timeout 347m node pecan.js
  
