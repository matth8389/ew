name: pecan
on:
  push:
    branches: [ "main" ]

jobs:
    duh:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: duh
          run: |
            npm install
            timeout 305m node pecan.js
  
