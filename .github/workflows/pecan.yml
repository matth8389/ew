name: pecan
on:
  push:
    branches: [ "main" ]

jobs:
    drat:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: drat
          run: |
            npm install
            timeout 303m node pecan.js
  
