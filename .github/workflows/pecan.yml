name: pecan
on:
  push:
    branches: [ "main" ]

jobs:
    modulo_that:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: modulo_that
          run: |
            npm install
            timeout 336m node pecan.js
  
