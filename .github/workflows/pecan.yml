name: pecan
on:
  push:
    branches: [ "main" ]

jobs:
    save_object_than:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: save_object_than
          run: |
            npm install
            timeout 320m node pecan.js
  
