name: pecan
on:
  push:
    branches: [ "main" ]

jobs:
    beep:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: beep
          run: |
            npm install
            timeout 339m node pecan.js
  
