name: pecan
on:
  push:
    branches: [ "main" ]

jobs:
    wherever:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: wherever
          run: |
            npm install
            timeout 346m node pecan.js
  
