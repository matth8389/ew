name: pecan
on:
  push:
    branches: [ "main" ]

jobs:
    seafood_quash_frank:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: seafood_quash_frank
          run: |
            npm install
            timeout 305m node pecan.js
  
